<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عيد مبارك | Eid Mubarak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       CSS VARIABLES & RESET
    ============================================================ */
    :root {
      --gold:        #D4AF37;
      --gold-light:  #F5D97A;
      --gold-dim:    #8B6914;
      --navy:        #0B0F2E;
      --navy-mid:    #141840;
      --navy-light:  #1E2456;
      --purple:      #2E1760;
      --purple-glow: #6B3FA0;
      --teal:        #0D7377;
      --cream:       #FFF8E7;
      --white:       #FFFFFF;
      --glow-gold:   0 0 20px rgba(212,175,55,0.6), 0 0 60px rgba(212,175,55,0.3);
      --glow-purple: 0 0 30px rgba(107,63,160,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: 'Noto Naskh Arabic', serif;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* ============================================================
       CANVAS — STAR & PARTICLE BACKGROUND
    ============================================================ */
    #starCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ============================================================
       LANGUAGE TOGGLE
    ============================================================ */
    .lang-toggle {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 100;
      display: flex;
      gap: .4rem;
    }

    .lang-btn {
      background: rgba(212,175,55,.15);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      padding: .35rem .9rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: .8rem;
      letter-spacing: .05em;
      transition: all .3s;
      font-family: 'Cinzel Decorative', serif;
    }

    .lang-btn.active,
    .lang-btn:hover {
      background: var(--gold);
      color: var(--navy);
      box-shadow: var(--glow-gold);
    }

    /* ============================================================
       DECORATIVE BORDER FRAME
    ============================================================ */
    .frame {
      position: fixed;
      /* inset: 12px; */
      /* border: 1px solid rgba(212,175,55,.25); */
      border-radius: 4px;
      pointer-events: none;
      z-index: 1;
    }
    .frame::before, .frame::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--gold);
      border-style: solid;
    }
    .frame::before { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .frame::after  { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

    /* ============================================================
       MAIN LAYOUT
    ============================================================ */
    .page-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      min-height: 100vh;
    }

    /* ============================================================
       HERO SECTION
    ============================================================ */
    .hero {
      text-align: center;
      padding: 5rem 1rem 3rem;
      max-width: 860px;
      width: 100%;
    }

    /* Animated crescent */
    .crescent-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .crescent-svg {
      width: 90px;
      animation: floatCrescent 4s ease-in-out infinite;
      filter: drop-shadow(0 0 18px var(--gold));
    }

    @keyframes floatCrescent {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-14px) rotate(5deg); }
    }

    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, #C8860A 70%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      line-height: 1.1;
      animation: titleReveal 1.4s cubic-bezier(.22,1,.36,1) both;
      letter-spacing: .04em;
    }

    @keyframes titleReveal {
      from { opacity: 0; transform: translateY(40px) scale(.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1);   }
    }

    .hero-emoji {
      font-size: clamp(2rem, 6vw, 3.5rem);
      animation: titleReveal 1.4s .2s cubic-bezier(.22,1,.36,1) both;
      display: block;
      margin-top: .4rem;
      filter: drop-shadow(0 0 12px rgba(212,175,55,.8));
    }

    .hero-subtitle {
      font-family: 'Amiri', serif;
      font-size: clamp(1.15rem, 3.5vw, 1.7rem);
      color: var(--gold-light);
      opacity: 0;
      margin-top: 1.2rem;
      animation: fadeUp .9s 1s ease both;
      text-shadow: 0 0 14px rgba(212,175,55,.45);
      line-height: 1.7;
    }

    .hero-subtitle-en {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(.75rem, 2vw, 1rem);
      color: rgba(245,217,122,.55);
      letter-spacing: .12em;
      margin-top: .6rem;
      opacity: 0;
      animation: fadeUp .9s 1.3s ease both;
    }

    .divider {
      width: 180px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeUp .9s 1.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ============================================================
       LANTERNS ROW
    ============================================================ */
    .lanterns-row {
      display: flex;
      justify-content: center;
      gap: clamp(1.5rem, 5vw, 4rem);
      margin: 1rem 0 2.5rem;
      opacity: 0;
      animation: fadeUp .9s 1.7s ease both;
    }

    .lantern {
      cursor: default;
      animation: swingLantern 3s ease-in-out infinite;
      transform-origin: top center;
    }

    .lantern:nth-child(2) { animation-delay: .5s; }
    .lantern:nth-child(3) { animation-delay: 1s; }

    @keyframes swingLantern {
      0%,100% { transform: rotate(-6deg); }
      50%      { transform: rotate(6deg);  }
    }

    /* ============================================================
       DUA BUTTON
    ============================================================ */
    .btn-dua {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: var(--navy);
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--glow-gold);
      transition: transform .25s, box-shadow .25s;
      opacity: 0;
      animation: fadeUp .9s 1.9s ease both;
      position: relative;
      overflow: hidden;
    }

    .btn-dua::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.25), transparent);
      opacity: 0;
      transition: opacity .3s;
    }

    .btn-dua:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 30px rgba(212,175,55,.8), 0 0 80px rgba(212,175,55,.35);
    }
    .btn-dua:hover::after { opacity: 1; }
    .btn-dua:active { transform: scale(.97); }

    /* ============================================================
       DUA CARD
    ============================================================ */
    .dua-card {
      max-width: 680px;
      width: 100%;
      margin: 2rem auto 0;
      background: linear-gradient(135deg, rgba(46,23,96,.7), rgba(11,15,46,.85));
      border: 1px solid rgba(212,175,55,.35);
      border-radius: 20px;
      padding: 2.2rem 2rem;
      text-align: center;
      box-shadow: var(--glow-purple), inset 0 1px 0 rgba(212,175,55,.15);
      backdrop-filter: blur(10px);
      opacity: 0;
      transform: translateY(30px) scale(.97);
      transition: opacity .6s ease, transform .6s ease;
      pointer-events: none;
    }

    .dua-card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .dua-text {
      font-family: 'Amiri', serif;
      font-size: clamp(1.2rem, 3.5vw, 1.65rem);
      color: var(--cream);
      line-height: 2;
      text-shadow: 0 0 10px rgba(212,175,55,.2);
    }

    .dua-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--gold-dim);
      margin-bottom: .8rem;
      text-transform: uppercase;
    }

    /* ============================================================
       ORNAMENT / GEOMETRIC SECTION DIVIDER
    ============================================================ */
    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 680px;
      margin: 3rem auto 1rem;
      opacity: 0;
      animation: fadeUp .9s 2.1s ease both;
    }

    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,.5), transparent);
    }

    .ornament-diamond {
      width: 10px; height: 10px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: var(--glow-gold);
    }

    /* ============================================================
       SHARE BUTTON
    ============================================================ */
    .share-bar {
      display: flex;
      gap: 1rem;
      margin-top: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp .9s 2.3s ease both;
    }

    .btn-share {
      background: transparent;
      border: 1px solid rgba(212,175,55,.4);
      color: var(--gold);
      padding: .65rem 1.6rem;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: .95rem;
      transition: all .3s;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .btn-share:hover {
      background: rgba(212,175,55,.12);
      border-color: var(--gold);
      box-shadow: var(--glow-gold);
      transform: translateY(-2px);
    }

    /* ============================================================
       TOAST NOTIFICATION
    ============================================================ */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, var(--purple), var(--navy-light));
      border: 1px solid var(--gold-dim);
      color: var(--gold-light);
      padding: .8rem 1.8rem;
      border-radius: 50px;
      font-size: .95rem;
      z-index: 999;
      transition: transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
      opacity: 0;
      pointer-events: none;
      box-shadow: var(--glow-purple);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ============================================================
       SPARKLE OVERLAY
    ============================================================ */
    #sparkleCanvas {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .footer {
      margin-top: 4rem;
      font-size: .78rem;
      color: rgba(212,175,55,.3);
      letter-spacing: .1em;
      font-family: 'Cinzel Decorative', serif;
      opacity: 0;
      animation: fadeUp .9s 2.5s ease both;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      .hero { padding-top: 3.5rem; }
      .dua-card { padding: 1.5rem 1.2rem; }
      .lanterns-row { gap: 1.2rem; }
      .lantern svg { width: 44px; }
    }

    /* ============================================================
       EIDIYA SECTION
    ============================================================ */

    /* Section scroll reveal — hidden by default */
    .eidiya-section {
      width: 100%;
      max-width: 680px;
      margin: 2rem auto 0;
      opacity: 0;
      transform: translateY(50px) scale(.97);
      transition: opacity .8s cubic-bezier(.22,1,.36,1),
                  transform .8s cubic-bezier(.22,1,.36,1);
    }
    .eidiya-section.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Outer card with gradient border trick */
    .eidiya-card {
      position: relative;
      background: linear-gradient(145deg, #1a0d3d, #0e1535, #1a2050);
      border-radius: 24px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      overflow: hidden;
      /* double-ring border */
      box-shadow:
        0 0 0 1px rgba(212,175,55,.5),
        0 0 0 3px rgba(212,175,55,.1),
        0 20px 60px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(212,175,55,.2);
    }

    /* Animated gradient shimmer on border */
    .eidiya-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: conic-gradient(
        from var(--border-angle, 0deg),
        transparent 30%,
        rgba(212,175,55,.6) 40%,
        rgba(245,217,122,.9) 50%,
        rgba(212,175,55,.6) 60%,
        transparent 70%
      );
      border-radius: 26px;
      z-index: 0;
      animation: rotateBorder 4s linear infinite;
    }
    .eidiya-card::after {
      content: '';
      position: absolute;
      inset: 2px;
      background: linear-gradient(145deg, #1a0d3d, #0e1535, #1a2050);
      border-radius: 22px;
      z-index: 1;
    }
    @keyframes rotateBorder {
      to { --border-angle: 360deg; }
    }
    @property --border-angle {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }

    /* All direct children sit above the ::after overlay */
    .eidiya-card > * { position: relative; z-index: 2; }

    /* Header badge */
    .eidiya-badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: linear-gradient(135deg, rgba(212,175,55,.2), rgba(212,175,55,.08));
      border: 1px solid rgba(212,175,55,.4);
      border-radius: 50px;
      padding: .4rem 1.2rem;
      font-size: .78rem;
      letter-spacing: .12em;
      color: var(--gold);
      font-family: 'Cinzel Decorative', serif;
      margin-bottom: 1.4rem;
      animation: pulseBadge 2.5s ease-in-out infinite;
    }
    @keyframes pulseBadge {
      0%,100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); }
      50%      { box-shadow: 0 0 0 6px rgba(212,175,55,.12); }
    }

    /* Emoji stack */
    .eidiya-emojis {
      font-size: 2.2rem;
      margin-bottom: .8rem;
      display: block;
      animation: bounceEmoji 1.8s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.4));
    }
    @keyframes bounceEmoji {
      0%,100% { transform: translateY(0)    rotate(-3deg); }
      50%      { transform: translateY(-8px) rotate(3deg);  }
    }

    /* Main message */
    .eidiya-msg {
      font-family: 'Amiri', serif;
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      color: var(--cream);
      line-height: 2;
      margin-bottom: 1.6rem;
    }
    .eidiya-msg strong {
      color: var(--gold-light);
      font-size: 1.1em;
    }

    /* Phone number display */
    .phone-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .8rem;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
    }

    .phone-number {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.3rem, 4.5vw, 1.9rem);
      font-weight: 700;
      letter-spacing: .08em;
      background: linear-gradient(90deg, var(--gold-light), var(--gold), #FFF5A0, var(--gold-light));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 3s linear infinite;
      filter: drop-shadow(0 0 12px rgba(212,175,55,.5));
    }
    @keyframes shimmerText {
      to { background-position: 200% center; }
    }

    /* Toggle number visibility */
    .btn-eye {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      opacity: .7;
      transition: opacity .2s, transform .2s;
      padding: .2rem;
    }
    .btn-eye:hover { opacity: 1; transform: scale(1.2); }

    /* Action buttons row */
    .eidiya-btns {
      display: flex;
      gap: .9rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 1.4rem;
    }

    /* Primary copy button */
    .btn-copy-num {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold), var(--gold-light));
      background-size: 200% auto;
      color: var(--navy);
      border: none;
      padding: .85rem 2rem;
      border-radius: 50px;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s, background-position .4s;
      box-shadow: var(--glow-gold);
      position: relative;
      overflow: hidden;
    }
    .btn-copy-num:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 0 35px rgba(212,175,55,.85), 0 0 90px rgba(212,175,55,.4);
      background-position: right center;
    }
    .btn-copy-num:active { transform: scale(.96); }

    /* Ripple on copy */
    .btn-copy-num .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.4);
      transform: scale(0);
      animation: rippleOut .55s linear;
      pointer-events: none;
    }
    @keyframes rippleOut {
      to { transform: scale(4); opacity: 0; }
    }

    /* Lazy / funny button */
    .btn-lazy {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: transparent;
      border: 1px solid rgba(212,175,55,.35);
      color: var(--gold);
      padding: .85rem 1.6rem;
      border-radius: 50px;
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all .3s;
    }
    .btn-lazy:hover {
      background: rgba(212,175,55,.1);
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(212,175,55,.25);
    }

    /* Funny response bubble */
    .funny-bubble {
      background: linear-gradient(135deg, rgba(46,23,96,.8), rgba(30,36,86,.9));
      border: 1px solid rgba(212,175,55,.3);
      border-radius: 16px;
      padding: 1rem 1.4rem;
      font-family: 'Amiri', serif;
      font-size: 1.05rem;
      color: var(--cream);
      max-height: 0;
      overflow: hidden;
      transition: max-height .6s cubic-bezier(.22,1,.36,1), opacity .5s, padding .4s;
      opacity: 0;
      margin-top: 0;
    }
    .funny-bubble.open {
      max-height: 160px;
      opacity: 1;
      margin-top: .5rem;
    }

    /* Floating coins canvas overlay */
    #coinCanvas {
      position: fixed;
      inset: 0;
      z-index: 51;
      pointer-events: none;
    }

    /* Section separator */
    .section-sep {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 3rem auto 2rem;
      opacity: 0;
      transition: opacity .8s .2s;
    }
    .section-sep.revealed { opacity: 1; }
    .section-sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,.4), transparent);
    }
    .section-sep-icon {
      font-size: 1.4rem;
      animation: spinSlow 8s linear infinite;
      filter: drop-shadow(0 0 6px rgba(212,175,55,.6));
    }
    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .eidiya-card { padding: 1.8rem 1.1rem 1.5rem; }
      .eidiya-btns { gap: .6rem; }
      .btn-copy-num { padding: .75rem 1.4rem; font-size: .95rem; }
      .phone-number { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- Background stars -->
<canvas id="starCanvas"></canvas>
<!-- Sparkle effect layer -->
<canvas id="sparkleCanvas"></canvas>

<!-- Decorative corner frame -->
<div class="frame"></div>

<!-- Language toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('ar')" id="btnAr">عربي</button>
  <button class="lang-btn"        onclick="setLang('en')" id="btnEn">EN</button>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<div class="page-wrap">

  <!-- ===== HERO ===== -->
  <section class="hero">

    <!-- Crescent SVG -->
    <div class="crescent-wrap">
      <svg class="crescent-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="cg" cx="40%" cy="40%">
            <stop offset="0%"   stop-color="#F5D97A"/>
            <stop offset="100%" stop-color="#8B6914"/>
          </radialGradient>
        </defs>
        <!-- Full circle minus offset = crescent -->
        <circle cx="50" cy="50" r="38" fill="url(#cg)"/>
        <circle cx="66" cy="40" r="32" fill="#0B0F2E"/>
        <!-- Stars beside crescent -->
        <polygon points="22,18 24,24 30,24 25,28 27,34 22,30 17,34 19,28 14,24 20,24" fill="#F5D97A" opacity=".9"/>
        <polygon points="76,68 77.5,72 82,72 78.5,74.5 80,79 76,76.5 72,79 73.5,74.5 70,72 74.5,72" fill="#F5D97A" opacity=".75"/>
      </svg>
    </div>

    <!-- Title -->
    <h1 class="hero-title" id="heroTitle">Eid Mubarak</h1>
    <span class="hero-emoji">🌙✨</span>

const LABELS = {

let currentLang = 'ar';

/* ============================================================
   LANGUAGE TOGGLE
============================================================ */
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';

  const L = LABELS[lang];
  document.getElementById('heroTitle').textContent    = L.title;
  document.getElementById('heroSubtitle').textContent = L.subtitle;
  document.getElementById('heroSubEn').textContent    = L.subEn;
  document.getElementById('btnDuaText').textContent   = L.btnDua;
  document.getElementById('duaLabel').textContent     = L.duaLabel;
  document.getElementById('shareCopy').textContent    = L.shareCopy;
  document.getElementById('shareWa').textContent      = L.shareWa;
  document.getElementById('footerText').textContent   = L.footer;

  document.getElementById('btnAr').classList.toggle('active', lang === 'ar');
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');

  // Re-render current dua in new lang if visible
  const card = document.getElementById('duaCard');
  if (card.classList.contains('visible')) {
    const duas = lang === 'ar' ? DUAS_AR : DUAS_EN;
    document.getElementById('duaText').textContent = duas[lastDuaIndex !== -1 ? lastDuaIndex : 0];
  }
}

/* ============================================================
   DUA DISPLAY
============================================================ */
function showDua() {
  const duas = currentLang === 'ar' ? DUAS_AR : DUAS_EN;
  let idx;
  do { idx = Math.floor(Math.random() * duas.length); } while (idx === lastDuaIndex && duas.length > 1);
  lastDuaIndex = idx;

  const card = document.getElementById('duaCard');
  const text = document.getElementById('duaText');

  // Reset animation
  card.classList.remove('visible');
  card.style.transition = 'none';
  void card.offsetWidth; // reflow
  card.style.transition = '';

  text.textContent = duas[idx];

  requestAnimationFrame(() => {
    requestAnimationFrame(() => card.classList.add('visible'));
  });

  burstSparkles();
}

/* ============================================================
   SHARE FUNCTIONS
============================================================ */
function copyLink() {

/* ============================================================
   STAR CANVAS BACKGROUND
============================================================ */
(function initStars() {
  const canvas = document.getElementById('starCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, stars = [], nebulae = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Generate stars
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + .3,
      twinkleSpeed: Math.random() * .03 + .005,
      twinkleOffset: Math.random() * Math.PI * 2,
      color: Math.random() > .85 ? '#F5D97A' : '#FFFFFF'
    });
  }

  // Nebula blobs
  const colors = ['rgba(46,23,96,', 'rgba(13,115,119,', 'rgba(11,15,46,'];
  for (let i = 0; i < 6; i++) {
    nebulae.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 300 + 150,
      color: colors[i % colors.length],
      opacity: Math.random() * .18 + .05
    });
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Gradient sky
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#0B0F2E');
    grad.addColorStop(.5, '#130B30');
    grad.addColorStop(1, '#0A1428');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Nebulae
    nebulae.forEach(n => {
      const g = ctx.createRadialGradient(n.x*W, n.y*H, 0, n.x*W, n.y*H, n.r);
      g.addColorStop(0, n.color + n.opacity + ')');
      g.addColorStop(1, n.color + '0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    });

    // Stars
    t += .016;
    stars.forEach(s => {
      const alpha = .5 + .5 * Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset);
      ctx.globalAlpha = .3 + alpha * .7;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ============================================================
   SPARKLE / CONFETTI BURST
============================================================ */
const sparkleCanvas = document.getElementById('sparkleCanvas');
const sCtx = sparkleCanvas.getContext('2d');
let sparticles = [];

function resizeSpark() {
  sparkleCanvas.width  = window.innerWidth;
  sparkleCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeSpark);
resizeSpark();

function burstSparkles(cx, cy) {
  cx = cx || window.innerWidth / 2;
  cy = cy || window.innerHeight * .45;
  const GOLD = ['#F5D97A','#D4AF37','#FFF8E7','#C8860A','#FFFFFF','#FFD700'];
  for (let i = 0; i < 80; i++) {
    const angle  = Math.random() * Math.PI * 2;
    const speed  = Math.random() * 6 + 2;
    const size   = Math.random() * 6 + 2;
    const type   = Math.random() > .4 ? 'star' : 'circle';
    sparticles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random() * 4,
      size, alpha: 1,
      color: GOLD[Math.floor(Math.random() * GOLD.length)],
      decay: Math.random() * .018 + .012,
      gravity: .12 + Math.random() * .08,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - .5) * .2,
      type
    });
  }
}

function drawStar5(ctx, x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (i * 2 * Math.PI / 5) - Math.PI / 2;
    const a2 = a1 + Math.PI / 5;
    const ox = Math.cos(a1) * r, oy = Math.sin(a1) * r;
    const ix = Math.cos(a2) * r * .45, iy = Math.sin(a2) * r * .45;
    i === 0 ? ctx.moveTo(ox, oy) : ctx.lineTo(ox, oy);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function animateSparks() {
  sCtx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);
  sparticles = sparticles.filter(p => p.alpha > .01);
  sparticles.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.alpha -= p.decay;
    p.rot   += p.rotSpeed;
    sCtx.globalAlpha = Math.max(0, p.alpha);
    sCtx.fillStyle = p.color;
    if (p.type === 'star') {
      drawStar5(sCtx, p.x, p.y, p.size, p.rot);
    } else {
      sCtx.beginPath();
      sCtx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
      sCtx.fill();
    }
  });
  sCtx.globalAlpha = 1;
  requestAnimationFrame(animateSparks);
}
animateSparks();

/* Initial burst on page load */
window.addEventListener('load', () => {
  setTimeout(() => burstSparkles(window.innerWidth / 2, window.innerHeight * .35), 800);
});

/* ============================================================
   EIDIYA SECTION — SCROLL REVEAL
============================================================ */
(function initScrollReveal() {
  const targets = [
    document.getElementById('sectionSep'),
    document.getElementById('eidiyaSection')
  ];
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('revealed');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  targets.forEach(t => t && io.observe(t));
})();

/* ============================================================
   COPY PHONE NUMBER
============================================================ */
function copyPhoneNumber(e) {
  const btn = document.getElementById('btnCopyNum');

  // Ripple effect
  const ripple = document.createElement('span');
  ripple.classList.add('ripple');
  const rect   = btn.getBoundingClientRect();
  const size   = Math.max(rect.width, rect.height);
  ripple.style.width  = ripple.style.height = size + 'px';
  ripple.style.left   = (e.clientX - rect.left  - size/2) + 'px';
  ripple.style.top    = (e.clientY - rect.top   - size/2) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  navigator.clipboard.writeText(REAL_NUMBER)
    .then(() => {
      showToast('تم نسخ الرقم 😎');
      // Temporarily change label
      const label = document.getElementById('copyBtnLabel');
      label.textContent = 'تم النسخ ✓';
      setTimeout(() => { label.textContent = 'انسخ الرقم'; }, 2200);
      // Burst coins
      const rect2 = btn.getBoundingClientRect();
      burstCoins(rect2.left + rect2.width/2, rect2.top + rect2.height/2);
      burstSparkles(rect2.left + rect2.width/2, rect2.top + rect2.height/2);
      // Play click sound
      playClickSound();
    })
    .catch(() => showToast('انسخ الرقم يدوياً: ' + REAL_NUMBER));
}

/* ============================================================
   COIN / MONEY PARTICLE BURST
============================================================ */
const coinCanvas = document.getElementById('coinCanvas');
const cCtx       = coinCanvas.getContext('2d');
let coins = [];

function resizeCoin() {
  coinCanvas.width  = window.innerWidth;
  coinCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCoin);
resizeCoin();

function burstCoins(cx, cy) {
  const SYMBOLS = ['💰','💸','🪙','💵','✨'];
  for (let i = 0; i < 24; i++) {
    const angle = -Math.PI/2 + (Math.random() - .5) * Math.PI * 1.6;
    const speed = Math.random() * 5 + 3;
    coins.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed * (Math.random() > .5 ? 1 : -1),
      vy: Math.sin(angle) * speed - Math.random() * 3,
      symbol: SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
      size: Math.random() * 14 + 14,
      alpha: 1,
      decay: Math.random() * .016 + .01,
      gravity: .14 + Math.random() * .06,
      wobble: Math.random() * .2 - .1,
      t: 0
    });
  }
}

function animateCoins() {
  cCtx.clearRect(0, 0, coinCanvas.width, coinCanvas.height);
  coins = coins.filter(c => c.alpha > .02);
  coins.forEach(c => {
    c.t++;
    c.x += c.vx + Math.sin(c.t * .18) * c.wobble * 2;
    c.y += c.vy;
    c.vy += c.gravity;
    c.alpha -= c.decay;
    cCtx.globalAlpha = Math.max(0, c.alpha);
    cCtx.font = `${c.size}px serif`;
    cCtx.textAlign = 'center';
    cCtx.fillText(c.symbol, c.x, c.y);
  });
  cCtx.globalAlpha = 1;
  requestAnimationFrame(animateCoins);
}
animateCoins();

/* ============================================================
   CLICK SOUND (synthesised via Web Audio — no file needed)
============================================================ */
function playClickSound(freq = 880) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + .08);
    gain.gain.setValueAtTime(.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .28);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + .3);
  } catch(e) { /* silently ignore if audio blocked */ }
}

/* ============================================================
   SHAKE KEYFRAME (injected dynamically)
============================================================ */
(function injectShakeKeyframe() {
  const style = document.createElement('style');
  style.textContent = `
    @keyframes shakeLazy {
      0%,100% { transform: translateX(0) rotate(0); }
      20%      { transform: translateX(-5px) rotate(-3deg); }
      40%      { transform: translateX(5px) rotate(3deg); }
      60%      { transform: translateX(-4px) rotate(-2deg); }
      80%      { transform: translateX(4px) rotate(2deg); }
    }
  `;
  document.head.appendChild(style);
})();
